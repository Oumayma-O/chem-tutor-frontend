services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: chem-guide-frontend-dev
    ports:
      - "8080:8080"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chem-guide-frontend-prod
    ports:
      - "4173:80"
